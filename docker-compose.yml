services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salud_financiera}
      POSTGRES_USER: ${POSTGRES_USER:-salud_financiera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Falta POSTGRES_PASSWORD en tu .env (copia .env.example y pon una contraseña propia)}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - salud-financiera-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salud_financiera}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  # Nombre real fijado explícitamente: si no, el nombre de proyecto de Docker Compose
  # se deriva del nombre de la carpeta, y renombrarla crearía un volumen nuevo vacío
  # dejando este (con los datos reales, en este Mac) huérfano. Fijar el nombre hace
  # que Compose lo reutilice si ya existe (como en este Mac) o lo cree si no (clon
  # nuevo en otra máquina) — funciona igual en los dos casos.
  salud-financiera-db:
    name: salud-financiera_salud-financiera-db
