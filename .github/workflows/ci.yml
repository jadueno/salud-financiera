name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cp src/data/finances.example.ts src/data/finances.ts
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: salud_financiera
          POSTGRES_PASSWORD: test
          POSTGRES_DB: salud_financiera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://salud_financiera:test@localhost:5432/salud_financiera_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:migrate
      - run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: salud_financiera
          POSTGRES_PASSWORD: test
          POSTGRES_DB: salud_financiera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://salud_financiera:test@localhost:5432/salud_financiera_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cp src/data/finances.example.ts src/data/finances.ts
      - run: npm ci
        working-directory: backend
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
